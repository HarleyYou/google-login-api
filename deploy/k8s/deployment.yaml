apiVersion: apps/v1
kind: Deployment
metadata:
  name: google-login-api
  namespace: default
  labels:
    app: google-login-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: google-login-api
  template:
    metadata:
      labels:
        app: google-login-api
    spec:
      containers:
        - name: api
          image: registry.gitlab.com/YOUR_GROUP/google-login-api:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          env:
            - name: APP_CORS_ALLOWED_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: google-login-api-config
                  key: cors-allowed-origin
            - name: APP_COOKIE_SECURE
              value: "true"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
